# Kubeflow PyTorchJob for QLoRA Training on SageMaker HyperPod (EKS)
# ===================================================================
# Multi-GPU QLoRA fine-tuning with DDP + DeepSpeed ZeRO-2.
# Supports single-node (NUM_NODES=1) and multi-node (NUM_NODES=2+).
#
# HyperPod features:
#   - Auto-resume: restarts the job on a healthy node after hardware failure
#   - Health checks: only schedules on nodes that pass deep health checks
#   - FSx for Lustre: shared storage survives node replacements
#
# Prerequisites:
#   - SageMaker HyperPod EKS cluster with the HyperPod Helm chart installed
#     (bundles Training Operator, NVIDIA device plugin, health monitoring agents)
#
# Usage:
#   export IMAGE=<account>.dkr.ecr.<region>.amazonaws.com/qwen3-qlora-training:latest
#   export NAMESPACE=ml-training NUM_GPUS=4 INSTANCE_TYPE=ml.g5.12xlarge
#   export NUM_WORKERS=0   # single-node (1 master), or 1 for 2-node, etc.
#   export GPU_RESOURCE=nvidia.com/gpu   # or nvidia.com/mig-3g.20gb for MIG
#   envsubst < kubernetes/qwen3_8b-qlora-zero2.yaml | kubectl apply -f -
#
apiVersion: kubeflow.org/v1
kind: PyTorchJob
metadata:
  name: qwen3-qlora-training-zero2
  namespace: ${NAMESPACE}
  labels:
    project: qwen3-qlora
    component: training
  annotations:
    sagemaker.amazonaws.com/enable-job-auto-resume: "true"
    sagemaker.amazonaws.com/job-max-retry-count: "3"
spec:
  pytorchReplicaSpecs:
    Master:
      replicas: 1
      restartPolicy: OnFailure
      template:
        metadata:
          labels:
            project: qwen3-qlora
            component: training
        spec:
          # HyperPod node-health toleration (replaces nvidia.com/gpu taint)
          tolerations:
            - key: sagemaker.amazonaws.com/node-health-status
              operator: Exists
              effect: NoSchedule

          # Schedule on healthy HyperPod nodes with the correct instance type
          nodeSelector:
            node.kubernetes.io/instance-type: ${INSTANCE_TYPE}

          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: sagemaker.amazonaws.com/node-health-status
                        operator: In
                        values:
                          - Schedulable
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  preference:
                    matchExpressions:
                      - key: sagemaker.amazonaws.com/deep-health-check-status
                        operator: In
                        values:
                          - Passed

          containers:
            - name: pytorch
              image: ${IMAGE}

              # Resource requests and limits
              # Defaults sized for g5.12xlarge (4x A10G, 48 vCPU, 192 GiB RAM).
              # For MIG, reduce to match the partition — see 1.deploy-training.sh.
              resources:
                requests:
                  memory: "${POD_MEMORY_REQUEST}"
                  cpu: "${POD_CPU_REQUEST}"
                  ${GPU_RESOURCE}: "${NUM_GPUS}"
                limits:
                  memory: "${POD_MEMORY_LIMIT}"
                  cpu: "${POD_CPU_LIMIT}"
                  ${GPU_RESOURCE}: "${NUM_GPUS}"

              # Environment variables
              env:
                - name: HF_HOME
                  value: "/fsx/hf_cache"
                - name: TRANSFORMERS_CACHE
                  value: "/fsx/hf_cache"
                - name: PYTORCH_CUDA_ALLOC_CONF
                  value: "expandable_segments:True,max_split_size_mb:64"
                # NCCL settings for multi-GPU communication
                - name: NCCL_DEBUG
                  value: "INFO"
                - name: NCCL_SOCKET_IFNAME
                  value: "^lo"
                # Disable P2P to avoid "illegal memory access" with QLoRA on PCIe GPUs
                - name: NCCL_P2P_DISABLE
                  value: "1"
                # Disable cuMem host allocations — requires NUMA, unavailable in containers
                - name: NCCL_CUMEM_HOST_ENABLE
                  value: "0"
                # Uncomment and set if using private models
                # - name: HF_TOKEN
                #   valueFrom:
                #     secretKeyRef:
                #       name: hf-secret
                #       key: token

              # Volume mounts
              volumeMounts:
                - name: fsx-storage
                  mountPath: /fsx
                # Shared memory for PyTorch DataLoader + NCCL
                - name: shm
                  mountPath: /dev/shm

              # Training arguments — the ENTRYPOINT reads PET_NPROC_PER_NODE
              # (set by the Training Operator via nprocPerNode below) and
              # launches torchrun with the correct number of processes.
              args:
                - "/app/src/train.py"
                - "--config_path=/app/configs/training_config_zero2.yaml"
                - "--output_dir=/fsx/qwen3-qlora/outputs"
                - "--resume_from_checkpoint=auto"

          # Volumes
          volumes:
            # FSx for Lustre — shared across nodes, survives node replacements
            - name: fsx-storage
              persistentVolumeClaim:
                claimName: fsx-claim-qlora

            # Shared memory for PyTorch NCCL backend + DataLoader
            - name: shm
              emptyDir:
                medium: Memory
                sizeLimit: "${SHM_SIZE}"

    # Worker replicas for multi-node training.
    # NUM_WORKERS=0 → single-node (Master only).
    # NUM_WORKERS=1 → 2 nodes (1 Master + 1 Worker), etc.
    Worker:
      replicas: ${NUM_WORKERS}
      restartPolicy: OnFailure
      template:
        metadata:
          labels:
            project: qwen3-qlora
            component: training
        spec:
          tolerations:
            - key: sagemaker.amazonaws.com/node-health-status
              operator: Exists
              effect: NoSchedule

          nodeSelector:
            node.kubernetes.io/instance-type: ${INSTANCE_TYPE}

          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: sagemaker.amazonaws.com/node-health-status
                        operator: In
                        values:
                          - Schedulable
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  preference:
                    matchExpressions:
                      - key: sagemaker.amazonaws.com/deep-health-check-status
                        operator: In
                        values:
                          - Passed

          containers:
            - name: pytorch
              image: ${IMAGE}

              resources:
                requests:
                  memory: "${POD_MEMORY_REQUEST}"
                  cpu: "${POD_CPU_REQUEST}"
                  ${GPU_RESOURCE}: "${NUM_GPUS}"
                limits:
                  memory: "${POD_MEMORY_LIMIT}"
                  cpu: "${POD_CPU_LIMIT}"
                  ${GPU_RESOURCE}: "${NUM_GPUS}"

              env:
                - name: HF_HOME
                  value: "/fsx/hf_cache"
                - name: TRANSFORMERS_CACHE
                  value: "/fsx/hf_cache"
                - name: PYTORCH_CUDA_ALLOC_CONF
                  value: "expandable_segments:True,max_split_size_mb:64"
                - name: NCCL_DEBUG
                  value: "INFO"
                - name: NCCL_SOCKET_IFNAME
                  value: "^lo"
                - name: NCCL_P2P_DISABLE
                  value: "1"
                - name: NCCL_CUMEM_HOST_ENABLE
                  value: "0"

              volumeMounts:
                - name: fsx-storage
                  mountPath: /fsx
                - name: shm
                  mountPath: /dev/shm

              args:
                - "/app/src/train.py"
                - "--config_path=/app/configs/training_config_zero2.yaml"
                - "--output_dir=/fsx/qwen3-qlora/outputs"
                - "--resume_from_checkpoint=auto"

          volumes:
            - name: fsx-storage
              persistentVolumeClaim:
                claimName: fsx-claim-qlora

            - name: shm
              emptyDir:
                medium: Memory
                sizeLimit: "${SHM_SIZE}"

  # nprocPerNode tells the Training Operator how many processes per node
  nprocPerNode: "${NUM_GPUS}"
