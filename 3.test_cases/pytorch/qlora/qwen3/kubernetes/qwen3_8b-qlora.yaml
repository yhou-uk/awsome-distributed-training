# Kubernetes Job for QLoRA Training (Multi-GPU with DDP + DeepSpeed)
# ==================================================================
# This Job runs QLoRA fine-tuning on multiple GPUs using:
#   - Data Parallelism (DDP): splits batches across GPUs
#   - DeepSpeed ZeRO-2: shards optimizer states & gradients across GPUs
#
# Together, these reduce per-GPU memory from ~23GB to ~15-17GB,
# preventing the CUDA illegal memory access crashes at step ~1500.
#
# GPU requirements: 4x NVIDIA A10G (g5.12xlarge) for multi-GPU mode,
# or 1x A10G (g5.4xlarge) for single-GPU mode.
#
# Usage:
#   export AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
#   export AWS_REGION=us-east-1
#   envsubst < kubernetes/qwen3_8b-qlora.yaml | kubectl apply -f -
#
apiVersion: batch/v1
kind: Job
metadata:
  name: qwen3-qlora-training
  namespace: ml-training
  labels:
    project: qwen3-qlora
    component: training
spec:
  # Allow more retries for transient failures
  backoffLimit: 10

  # Clean up completed pods after 1 hour
  ttlSecondsAfterFinished: 3600

  template:
    metadata:
      labels:
        project: qwen3-qlora
        component: training
    spec:
      restartPolicy: OnFailure

      # Tolerate the GPU node taint
      # This allows the pod to be scheduled on GPU nodes
      tolerations:
        - key: nvidia.com/gpu
          operator: Equal
          value: "true"
          effect: NoSchedule

      # Node selector to ensure we land on GPU nodes
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-type
                    operator: In
                    values:
                      - gpu

      containers:
        - name: trainer
          # Image will be substituted with actual ECR URI
          # Use envsubst or sed to replace these placeholders
          image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/qwen3-qlora-training:latest

          # Resource requests and limits (optimized for g5.12xlarge = 4x A10G)
          resources:
            requests:
              memory: "160Gi"
              cpu: "40"
              nvidia.com/gpu: "4"
            limits:
              memory: "180Gi"
              cpu: "44"
              nvidia.com/gpu: "4"

          # Environment variables
          env:
            - name: HF_HOME
              value: "/workspace/hf_cache"
            - name: TRANSFORMERS_CACHE
              value: "/workspace/hf_cache"
            # Do NOT set CUDA_VISIBLE_DEVICES — torchrun manages GPU assignment
            - name: PYTORCH_CUDA_ALLOC_CONF
              value: "max_split_size_mb:128,expandable_segments:True"
            # NCCL settings for multi-GPU communication
            - name: NCCL_DEBUG
              value: "INFO"
            - name: NCCL_SOCKET_IFNAME
              value: "eth0"
            # Uncomment and set if using private models
            # - name: HF_TOKEN
            #   valueFrom:
            #     secretKeyRef:
            #       name: hf-secret
            #       key: token

          # Volume mounts
          volumeMounts:
            - name: training-storage
              mountPath: /workspace
            # Shared memory for PyTorch DataLoader + NCCL
            - name: shm
              mountPath: /dev/shm

          # Training command: torchrun for multi-GPU DDP + DeepSpeed
          # torchrun handles spawning one process per GPU and setting
          # RANK, LOCAL_RANK, WORLD_SIZE environment variables.
          command:
            - torchrun
            - "--nproc_per_node=4"
            - "--master_port=29500"
            - "/app/src/train.py"
          args:
            - "--config_path=/app/configs/training_config.yaml"
            - "--output_dir=/workspace/outputs"
            - "--resume_from_checkpoint=auto"

      # Volumes
      volumes:
        # Persistent storage for model and checkpoints
        - name: training-storage
          persistentVolumeClaim:
            claimName: training-storage

        # Shared memory for PyTorch NCCL backend + DataLoader
        # Increased from 16Gi to 32Gi for multi-GPU all-reduce operations
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: "32Gi"
---
# Optional: ConfigMap for training configuration
# Uncomment if you want to customize config without rebuilding image
